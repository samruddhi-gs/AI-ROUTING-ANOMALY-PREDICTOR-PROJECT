<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle,#1c2128,#0b0e14);
font-family:Segoe UI;
color:white;
}

.card{
background:#161b22;
padding:40px;
border-radius:20px;
width:380px;
border:1px solid #30363d;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:14px;
margin-top:12px;
background:#0d1117;
border:1px solid #30363d;
border-radius:10px;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#00d2ff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.success{
display:none;
color:#3fb950;
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h2 style="color:#00d2ff">Set New Password</h2>

<input type="password" id="password" placeholder="New Password">

<input type="password" id="confirm" placeholder="Confirm Password">

<button id="resetBtn" onclick="resetPassword()">
Set Password
</button>

<div id="msg" class="success">
✅ Password reset successful!
<br>
<a href="login.html" style="color:#00d2ff">Go to Login</a>
</div>

</div>

<script>

async function resetPassword(){

const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get("email");

if(!email){
alert("Invalid reset link");
return;
}

const password = document.getElementById("password").value;
const confirm = document.getElementById("confirm").value;

if(!password || !confirm){
alert("Enter password");
return;
}

if(password !== confirm){
alert("Passwords not matching");
return;
}

const btn = document.getElementById("resetBtn");

btn.disabled = true;
btn.innerText = "Processing...";

try{

const res = await fetch("http://127.0.0.1:5000/api/reset-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
});

const data = await res.json();

if(data.status==="success"){
document.getElementById("msg").style.display="block";
}
else{
alert(data.message);
}

}catch(err){
alert("Server error");

}

btn.disabled = false;
btn.innerText = "Set Password";

}

</script>

</body>
</html>
