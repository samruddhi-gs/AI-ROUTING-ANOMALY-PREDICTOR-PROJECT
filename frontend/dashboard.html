<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI GUARD PRO | Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

:root {
    --bg: #0b0e14;
    --sidebar: #11141b;
    --card: #161b22;
    --primary: #00d2ff;
    --border: #30363d;
    --text-dim: #8b949e;
    --danger: #f85149;
    --success: #3fb950;
    --warning: #d29922;
    --accent: rgba(0, 210, 255, 0.1);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* ── Sidebar styles live HERE so they apply when sidebar.html is injected ── */
#sidebar-container { display: flex; flex-shrink: 0; }

.sidebar {
    width: 280px;
    height: 100vh;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 25px 0;
    flex-shrink: 0;
}

.sidebar-header {
    padding: 0 25px 30px;
    color: var(--primary);
    font-size: 22px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 12px;
}

nav {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 15px;
    flex: 1;
}

.nav-item {
    padding: 14px 20px;
    color: var(--text-dim);
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 15px;
    border-radius: 8px;
    text-decoration: none;
}

.nav-item:hover { background: var(--accent); color: white; }

.nav-item.active {
    background: var(--primary);
    color: #000 !important;
    font-weight: bold;
}

.logout {
    margin: 15px;
    padding: 14px 20px;
    color: var(--danger);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 15px;
    border-radius: 8px;
    transition: 0.3s;
    user-select: none;
}

.logout:hover { background: rgba(248, 81, 73, 0.15); }

/* ── Main Content ── */
.main-content {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
    background: radial-gradient(circle at top right, #1a1f29, #0b0e14);
}

.content-section { animation: fadeIn 0.4s ease; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.grid-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 12px;
    transition: 0.3s;
}

.stat-card:hover { border-color: var(--primary); }
.stat-card small { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
.stat-card h2 { margin: 10px 0; font-size: 28px; font-family: Consolas; }

.grid-main {
    display: grid;
    grid-template-columns: 1.4fr 0.6fr;
    gap: 20px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 25px;
}

.health-status {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    background: rgba(63, 185, 80, 0.1);
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--success);
}

#liveTracker {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    height: 260px;
    overflow: hidden;
    line-height: 1.6;
    color: var(--success);
}

</style>
</head>
<body>

<!-- Auth guard -->
<script>
if (localStorage.getItem('isLoggedIn') !== 'true') {
    window.location.href = 'login.html';
}
</script>

<!-- ✅ Step 1: Sidebar container -->
<div id="sidebar-container"></div>

<!-- Main Content -->
<main class="main-content">
    <section class="content-section">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
            <div>
                <h1 style="margin:0;">Command Center</h1>
                <p style="color:var(--text-dim);margin-top:5px;">AI-Driven Network Anomaly Predictor v2.0</p>
            </div>
        </div>

        <div class="health-status">
            <i class="fas fa-circle-check" style="color:var(--success)"></i>
            <span>Network Health: <b>Healthy</b> | Last Auto-Scan: <span id="time">Just now</span></span>
        </div>

        <div class="grid-stats">
            <div class="stat-card">
                <small>Total Routes</small>
                <h2>14,822</h2>
            </div>
            <div class="stat-card">
                <small>Active Nodes</small>
                <h2>286</h2>
            </div>
            <div class="stat-card" style="border-bottom:3px solid var(--danger)">
                <small style="color:var(--danger)">Anomalies Detected</small>
                <h2 id="anomalyCount" style="color:var(--danger)">23</h2>
            </div>
            <div class="stat-card" style="border-bottom:3px solid var(--success)">
                <small style="color:var(--success)">System Status</small>
                <h2 style="color:var(--success)">ONLINE</h2>
            </div>
        </div>

        <div class="grid-main">
            <div class="card">
                <h3 style="margin-top:0;">Anomaly Detection Over Time</h3>
                <div style="height:300px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
            <div class="card" style="background:#000;border-color:#222;">
                <h3 style="margin-top:0;font-size:14px;color:var(--warning);">
                    <i class="fas fa-bolt"></i> REAL-TIME TRACKING
                </h3>
                <hr style="border:0;border-top:1px solid #222;margin:15px 0;">
                <div id="liveTracker"></div>
            </div>
        </div>

    </section>
</main>

<!-- ✅ Step 2: Load sidebar (inject HTML + wire logout + active highlight) -->
<script src="sidebar-loader.js"></script>

<!-- Dashboard logic -->
<script>
function initChart() {
    const ctx = document.getElementById("mainChart").getContext("2d");
    new Chart(ctx, {
        type: "line",
        data: {
            labels: ["10:00","10:10","10:20","10:30","10:40","10:50"],
            datasets: [{
                data: [12, 19, 8, 17, 12, 15],
                borderColor: "#00d2ff",
                backgroundColor: "rgba(0,210,255,0.1)",
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        }
    });
}

const logs = [
    "> Monitoring AS15169",
    "> Latency spike at Node-12",
    "> Prefix 192.0.2.0 verified",
    "> [ALERT] Possible Hijack - AS9901"
];

let i = 0;
function updateTerminal() {
    const tracker = document.getElementById("liveTracker");
    const line = document.createElement("div");
    line.innerText = logs[i % logs.length];
    if (line.innerText.includes("ALERT")) line.style.color = "#f85149";
    tracker.prepend(line);
    if (tracker.children.length > 12) tracker.lastChild.remove();
    i++;
}

window.onload = function () {
    initChart();
    setInterval(updateTerminal, 2000);
    setInterval(function () {
        const el = document.getElementById("anomalyCount");
        el.innerText = parseInt(el.innerText) + (Math.random() > 0.5 ? 1 : -1);
    }, 4000);
};
</script>

</body>
</html>
