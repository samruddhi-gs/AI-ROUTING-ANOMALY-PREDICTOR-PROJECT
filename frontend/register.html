<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Routing Anomaly Predictor</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0b0e14;
            --card: #161b22;
            --border: #30363d;
            --text-dim: #8b949e;
            --success: #3fb950;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1c2128 0%, #0b0e14 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .register-container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section h2 { 
            color: var(--primary); 
            font-size: 22px; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { 
            display: block; 
            font-size: 11px; 
            color: var(--text-dim); 
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            text-transform: uppercase;
            margin-top: 15px;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn-register:hover {
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
            transform: translateY(-1px);
        }

        .footer-links { margin-top: 25px; font-size: 13px; color: var(--text-dim); }
        /* FIXED: Pointing to login.html instead of index.html */
        .footer-links a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: bold;
        }
        .footer-links a:hover { text-decoration: underline; }

        .status-msg {
            margin-top: 15px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="header-section">
            <h2 style="display:flex; align-items:center; justify-content:center; gap:10px;">
                <span style="font-size:24px;">🛡️</span> NEW IDENTITY
            </h2>
            <p style="color:var(--text-dim); font-size:11px; letter-spacing: 1px;">Initialize Cyber Intelligence Access</p>
        </div>

        <form onsubmit="saveUser(event)">
            <div class="form-group">
                <label>FULL NAME</label>
                <input type="text" id="newName" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label>EMAIL / ACCOUNT ID</label>
                <input type="email" id="newEmail" placeholder="user@security-node.com" required>
            </div>
            <div class="form-group">
                <label>SET SECURE PASSWORD</label>
                <input type="password" id="newPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-register" id="regBtn">Initialize Node Access</button>
            <div id="status" class="status-msg"></div>
        </form>

        <div class="footer-links">
            Already have access? <a href="login.html">Login Here</a>
        </div>
    </div>

    <script>
        async function saveUser(event) {
    event.preventDefault();

    const btn = document.getElementById('regBtn');
    const status = document.getElementById('status');

    const name = document.getElementById('newName').value;
    const email = document.getElementById('newEmail').value;
    const password = document.getElementById('newPassword').value;

    btn.innerText = "Processing...";
    btn.style.opacity = "0.7";

    try {

        const response = await fetch("http://127.0.0.1:5000/api/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                email,
                password
            })
        });

        const data = await response.json();

        if (response.ok) {

            status.style.display = "block";
            status.style.color = "var(--success)";
            status.innerText = "✅ Registration Successful!";

            alert("Account Created! Redirecting to Login...");

            window.location.href = "login.html";

        } else {

            alert(data.message || "Registration Failed");
        }

    } catch (error) {
        console.error(error);
        alert("Server connection error");
    }

    btn.innerText = "Initialize Node Access";
    btn.style.opacity = "1";
}
    </script>
</body>
</html>
