<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - AI Routing</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="width: 800px;">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Admin Control Center</h2>
            <button onclick="window.location.href='login.html'" style="width: 100px; background: red;">Logout</button>
        </header>
        
        <div class="dashboard-grid" style="display: flex; gap: 20px; margin-top: 20px;">
            <div class="stat-card" style="background: #e3f2fd; padding: 20px; flex: 1; border-radius: 10px;">
                <h3>Total Scans</h3>
                <p id="total-scans" style="font-size: 24px; font-weight: bold;">1,240</p>
            </div>
            <div class="stat-card" style="background: #ffebee; padding: 20px; flex: 1; border-radius: 10px;">
                <h3>Anomalies Found</h3>
                <p id="total-anomalies" style="font-size: 24px; font-weight: bold; color: red;">12</p>
            </div>
        </div>

        <h3 style="margin-top: 30px;">Recent System Logs</h3>
        <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
            <tr style="background: #eee;">
                <th>Time</th>
                <th>User</th>
                <th>Result</th>
            </tr>
            <tr>
                <td>10:45 AM</td>
                <td>User_01</td>
                <td style="color: green;">Normal</td>
            </tr>
            <tr>
                <td>11:02 AM</td>
                <td>User_05</td>
                <td style="color: red;">Anomaly!</td>
            </tr>
        </table>
    </div>
</body>
</html>
