<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Access | AI Routing Predictor</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0b0e14;
            --card: #161b22;
            --border: #30363d;
            --text-dim: #8b949e;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1c2128 0%, #0b0e14 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .reset-container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .status-msg {
            display: none;
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            border: 1px solid var(--primary);
        }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: bold; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-send {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="reset-container">
        <div id="statusBox" class="status-msg">
            📩 <strong>LINK SENT!</strong> <br>
            A secure recovery link has been sent to your email.
        </div>

        <div id="formContent">
            <h2 style="color:var(--primary); font-size: 18px;">RECOVER ACCESS</h2>
            <p style="color:var(--text-dim); font-size:11px; margin-bottom: 25px;">Enter your ID to receive a reset link</p>

            <form onsubmit="simulateEmail(event)">
                <div class="form-group">
                    <label>REGISTERED EMAIL</label>
                    <input type="email" id="emailInput" placeholder="admin@system.com" required>
                </div>
                <button type="submit" class="btn-send" id="sendBtn">Send Reset Link</button>
            </form>
        </div>

        <div style="margin-top: 25px;">
            <a href="login.html" style="color:var(--primary); text-decoration:none; font-size:13px;">← RETURN TO LOGIN</a>
        </div>
    </div>

    <script>
       async function simulateEmail(event){

    event.preventDefault();

    const btn = document.getElementById('sendBtn');
    const email = document.getElementById('emailInput').value;

    btn.innerText = "Sending...";
    btn.disabled = true;

    try{

        const res = await fetch("http://127.0.0.1:5000/api/reset-link",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email:email
            })
        });

        const data = await res.json();

        if(data.status==="success"){

            document.getElementById('formContent').style.display='none';
            document.getElementById('statusBox').style.display='block';

        }else{
            alert(data.message);
        }

    }catch(err){
        alert("Server error");
    }

}
    </script>
</body>
</html>
